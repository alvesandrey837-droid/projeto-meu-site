<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Para o Meu Amor ❤️</title>

<style>
body{
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;
  padding-top:80px;
}

.card{
  background: rgba(0,0,0,0.2);
  padding:40px;
  margin:auto;
  width:80%;
  max-width:400px;
  border-radius:20px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:white;
  color:#ff4f7b;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#ffe3ec;
}
</style>
</head>

<body>

<div class="card">
<h1>Para Você ❤️</h1>

<p>
Desde que você entrou na minha vida tudo ficou mais bonito.
Você é a razão do meu sorriso todos os dias.
</p>

<p>
Eu te amo muito e sempre vou estar ao seu lado.
</p>

<button onclick="mostrar()">Clique aqui 💌</button>

<p id="msg"></p>

</div>

<script>
function mostrar(){
document.getElementById("msg").innerHTML =
"Você é o amor da minha vida ❤️";
}
</script>

</body>
</html>
